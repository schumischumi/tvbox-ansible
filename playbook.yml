---
- name: Configure TV-Box
  hosts: localhost
  gather_facts: true
  become: true
  pre_tasks:
    - name: Fetch the default username from /etc/passwd
      ansible.builtin.shell: |
        set -o pipefail
        awk -F: '$3 >= 1000 && $3 < 65534 && $7 != "/usr/sbin/nologin" && $7 != "/bin/false" {print $1}' /etc/passwd | head -n 1
      register: default_user
      changed_when: false

    - name: Set the default username as a fact
      ansible.builtin.set_fact:
        default_username: "{{ default_user.stdout }}"

    - name: Prompt for username with default value
      ansible.builtin.pause:
        prompt: "Enter username for auto login and general config (default: {{ default_username }})"
      register: tv_user_prompt

    - name: Set the final username
      ansible.builtin.set_fact:
        tv_user: "{{ tv_user_prompt.user_input if tv_user_prompt.user_input | length > 0 else default_username }}"

    - name: Get passwd entry for selected user
      ansible.builtin.getent:
        database: passwd
        key: "{{ tv_user }}"

    - name: Set tv_user_id fact
      ansible.builtin.set_fact:
        tv_user_id: "{{ ansible_facts.getent_passwd[tv_user][2] | int }}"

    - name: Debug the user ID
      ansible.builtin.debug:
        msg: "User '{{ tv_user }}' has UID {{ tv_user_id }}"


    # Check if user exists
    - name: Verify that the specified user exists
      ansible.builtin.command: getent passwd {{ tv_user }}
      register: user_check
      ignore_errors: true
      changed_when: false

    - name: Fail if user does not exist
      ansible.builtin.fail:
        msg: "The user '{{ tv_user }}' does not exist."
      when: user_check.rc != 0

    # Check if home directory exists
    - name: Verify that the home directory for the specified user exists
      ansible.builtin.stat:
        path: /home/{{ tv_user }}
      register: home_dir_stat

    - name: Fail if home directory does not exist
      ansible.builtin.fail:
        msg: "The home directory '/home/{{ tv_user }}' does not exist."
      when: not home_dir_stat.stat.exists

    - name: Prompt for steamgriddb api key
      ansible.builtin.pause:
        prompt: "Enter steamgriddb api key (can also be entered later in the UI) (default: '')"
      register: steamgriddb_api_key_prompt

    - name: Set the final steamgriddb_api_key
      ansible.builtin.set_fact:
        steamgriddb_api_key: "{{ steamgriddb_api_key_prompt }}"

  roles:
    - role: base_system
      tags: [system, packages]

    - role: flatpak
      tags: [system, flatpak]

    - role: display_manager
      tags: [desktop, login]

    - role: tv_launcher
      tags: [system, ui]

    - role: host_configuration
      tags: [system, config]

    - role: update_manager
      tags: [system, config]
