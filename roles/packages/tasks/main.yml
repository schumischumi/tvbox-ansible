############################################
# Install basic packages
############################################

- name: Get Fedora version
  ansible.builtin.shell: "rpm -E %fedora"
  register: fedora_version
  changed_when: false
  ignore_errors: true
  check_mode: no

- name: Import RPM Fusion Free GPG key
  community.general.yum_repository_import_key:
    # The task is only relevant for Fedora 39 and above, where the repo file itself contains the key.
    # For older versions (like F38), the old behavior of installing the .rpm to extract the key was often safer or necessary.
    key_url: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ fedora_version.stdout }}.noarch.rpm"
  when: fedora_version.stdout | int >= 39
- name: Install RPM Fusion free repo
  dnf:
    name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ fedora_version.stdout }}.noarch.rpm"
    state: present

- name: Install RPM Fusion nonfree repo
  dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ fedora_version.stdout }}.noarch.rpm"
    state: present

- name: Install base packages
  dnf:
    name:
      - flatpak
      - libva-utils
      - libva
      - gstreamer1-vaapi
      - intel-gpu-tools
      - mesa-dri-drivers
      - mesa-vdpau-drivers-freeworld
      - gnome-text-editor
      - libva-intel-driver
      - python3-tkinter
    state: present

############################################
# Base config
############################################
- name: Set the hostname
  ansible.builtin.hostname:
    name: "fedora-tvbox-test1"

- name: Set the timezone to Europe/Berlin
  ansible.builtin.command:
    cmd: timedatectl set-timezone Europe/Berlin


############################################
# Install packages for dvd autoplay
############################################
- name: Install rpmfusion tainted repo
  dnf:
    name: rpmfusion-free-release-tainted
    state: present
  when: install_dvd_autoplay

- name: Install dvd packages
  dnf:
    name:
      - libdvdcss
      - udisks2
      - mpv
    state: present
  when: install_dvd_autoplay
