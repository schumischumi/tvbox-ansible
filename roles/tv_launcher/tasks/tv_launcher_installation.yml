- name: Get the latest release information from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tv_launcher_repo }}/releases/latest"
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: tv_launcher_github_release
  changed_when: false

- name: Find the right Linux portable asset (TVLauncher.Linux.*.Portable.tar.gz)
  ansible.builtin.set_fact:
    tv_launcher_target_asset: >-
      {{ tv_launcher_github_release.json.assets
          | selectattr('name', 'search', 'Linux.*Portable\.tar\.gz$')
          | first }}
  when: tv_launcher_github_release.json.assets is defined and tv_launcher_github_release.json.assets | length > 0

- name: Check whether tvlauncher.version exists
  ansible.builtin.stat:
    path: "{{ tv_launcher_version_file }}"
  register: tv_launcher_version_file

- name: Read out currently saved file name
  ansible.builtin.slurp:
    src: "{{ tv_launcher_version_file }}"
  register: tv_launcher_current_version_file
  when: tv_launcher_version_file.stat.exists

- name: Set current filename
  ansible.builtin.set_fact:
    tv_launcher_current_version: "{{ tv_launcher_current_version_file.content | b64decode | trim | default('') }}"
  when: tv_launcher_version_file.stat.exists

- name: Do we need a download?
  ansible.builtin.set_fact:
    tv_launcher_needs_download: >-
      {{ not tv_launcher_version_file.stat.exists or (tv_launcher_target_asset.name | default('') != tv_launcher_current_version) }}

- name: Download TVLauncher latest version to temp directory
  ansible.builtin.get_url:
    url: "{{ tv_launcher_target_asset.browser_download_url }}"
    dest: "/tmp/TVLauncher_LATEST.tar.gz"
    mode: '0644'
  when:
    - tv_launcher_target_asset is defined and tv_launcher_target_asset.browser_download_url is defined
    - tv_launcher_needs_download | bool
  register: tv_launcher_download_result

- name: Remove old folder if exists
  ansible.builtin.file:
    path: "{{ tv_launcher_dir }}"
    state: absent
    force: true

- name: Create a directory for release version
  ansible.builtin.file:
    path: "{{ tv_launcher_dir }}"
    state: directory
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: '0755'

- name: Extract TVLauncher to directory
  ansible.builtin.unarchive:
    src: "/tmp/TVLauncher_LATEST.tar.gz"
    dest: "{{ tv_launcher_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "{{ tv_launcher_script }}"
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: 'u+rwX,g+rX,o+rX'

- name: Make launcher script executable
  ansible.builtin.file:
    path: "{{ tv_launcher_script }}"
    mode: '0755'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"

- name: Save new version
  ansible.builtin.copy:
    content: "{{ tv_launcher_target_asset.name }}"
    dest: "{{ tv_launcher_version_file }}"
    mode: '0644'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
  when:
    - tv_launcher_target_asset is defined
    - tv_launcher_needs_download | bool

- name: Apply launcher config
  ansible.builtin.template:
    src: launcher-apps.json.j2
    dest: "{{ tv_launcher_dir }}/launcher-apps.json"
    mode: '0644'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
