- name: Get the latest release information from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/Darkvinx88/TvLauncher/releases/latest"
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: github_release
  changed_when: false

- name: Find the right Linux portable asset (TVLauncher.Linux.*.Portable.tar.gz)
  ansible.builtin.set_fact:
    target_asset: >-
      {{ github_release.json.assets
          | selectattr('name', 'search', 'Linux.*Portable\.tar\.gz$')
          | first }}
  when: github_release.json.assets is defined and github_release.json.assets | length > 0

