- name: Extract the latest Linux download URL
  ansible.builtin.uri:
    url: "https://api.github.com/repos/Darkvinx88/TvLauncher/releases/latest"
    method: GET
  register: tv_assets_response
  #when: tv_launcher_latest_release is succeeded

- name: Find the Linux tarball asset URL from release assets
  ansible.builtin.set_fact:
    tv_launcher_url: "{{ tv_assets_response.json.assets | select('search', 'Linux') | select('search', 'Portable.tar.gz') | first.browser_download_url }}"
  ignore_errors: true

- name: Download TVLauncher latest version to temp directory
  ansible.builtin.get_url:
    url: "{{ tv_launcher_url }}"
    dest: "/tmp/TVLauncher_LATEST.tar.gz"
    mode: '0644'
  when: tv_launcher_url is defined

# - name: Parse the version from filename or release metadata
#   ansible.builtin.set_fact:
#     tv_launcher_version: "{{ tv_launcher_latest_release.json.tag_name | default('latest') }}"

- name: Remove old folder if exists
  ansible.builtin.file:
    path: "/home/{{ tv_user }}/TvLauncher"
    state: absent
    force: true

- name: Create a unique directory for each release version
  ansible.builtin.file:
    path: "/home/{{ tv_user }}/TvLauncher"
    state: directory
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: '0755'

- name: Extract TVLauncher to version-specific directory
  ansible.builtin.unarchive:
    src: "/tmp/TVLauncher_LATEST.tar.gz"
    dest: "/home/{{ tv_user }}/TvLauncher"
    remote_src: true
    creates: "/home/{{ tv_user }}/TvLauncher/Launcher.sh"
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: 'u+rwX,g+rX,o+rX'

- name: Make launcher script executable
  ansible.builtin.file:
    path: "/home/{{ tv_user }}/TvLauncher/Launcher.sh"
    mode: '0755'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"

