- name: Get the latest release information from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tv_launcher_repo }}/releases/latest"
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: github_release
  changed_when: false

- name: Find the right Linux portable asset (TVLauncher.Linux.*.Portable.tar.gz)
  ansible.builtin.set_fact:
    target_asset: >-
      {{ github_release.json.assets
          | selectattr('name', 'search', 'Linux.*Portable\.tar\.gz$')
          | first }}
  when: github_release.json.assets is defined and github_release.json.assets | length > 0

- name: Download TVLauncher latest version to temp directory
  ansible.builtin.get_url:
    url: "{{ target_asset.browser_download_url }}"
    dest: "/tmp/TVLauncher_LATEST.tar.gz"
    mode: '0644'
  when: target_asset is defined and target_asset.browser_download_url is defined
  register: download_result

- name: success message
  ansible.builtin.debug:
    msg: "File downloaded successfully: {{ download_result.dest }}"
  when: download_result.changed

- name: Remove old folder if exists
  ansible.builtin.file:
    path: "{{ tv_launcher_dir }}"
    state: absent
    force: true

- name: Create a unique directory for each release version
  ansible.builtin.file:
    path: "{{ tv_launcher_dir }}"
    state: directory
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: '0755'

- name: Extract TVLauncher to version-specific directory
  ansible.builtin.unarchive:
    src: "/tmp/TVLauncher_LATEST.tar.gz"
    dest: "{{ tv_launcher_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    creates: "{{ tv_launcher_script }}"
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
    mode: 'u+rwX,g+rX,o+rX'

- name: Make launcher script executable
  ansible.builtin.file:
    path: "{{ tv_launcher_script }}"
    mode: '0755'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
