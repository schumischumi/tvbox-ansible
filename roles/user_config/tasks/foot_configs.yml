- name: Create foot config directory
  ansible.builtin.file:
    path: "/home/{{ tv_user }}/.config/foot"
    state: directory
    mode: '0755'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"

- name: Copy foot config
  ansible.builtin.copy:
    src: foot/foot.ini
    dest: "/home/{{ tv_user }}/.config/foot/foot.ini"
    mode: '0755'
    owner: "{{ tv_user }}"
    group: "{{ tv_user }}"
