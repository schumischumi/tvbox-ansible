exec --no-startup-id flatpak run rocks.shy.VacuumTube --fullscreen
exec --no-startup-id flatpak run com.github.iwalton3.jellyfin-media-player
exec --no-startup-id flatpak run org.libretro.RetroArch
exec --no-startup-id flatpak run com.valvesoftware.SteamLink
exec --no-startup-id python3 ~/big_button_executor.py ~/.config/bbe/config/update_all_packages.json
exec --no-startup-id python3 ~/big_button_executor.py ~/.config/bbe/config/launch_dvd.json

for_window [app_id="com.github.iwalton3.jellyfin-media-player"] move to workspace 2
for_window [app_id="com.libretro.RetroArch"] move to workspace 3
for_window [app_id="com.valvesoftware.steamlink"] move to workspace 4
for_window [title="^UpdaterButton$"] move to workspace 5
for_window [title="^DVDButton$"] move to workspace 6

for_window [app_id="com.github.iwalton3.jellyfin-media-player"] fullscreen enable
for_window [app_id="com.libretro.RetroArch"] fullscreen enable
for_window [title="^UpdaterButton$"] fullscreen enable
for_window [title="^DVDButton$"] fullscreen enable
