- name: Create sway config directory
  file:
    path: "{{ ansible_env.HOME }}/.config/sway"
    state: directory
    mode: '0755'
  become: true

- name: Install sway config
  copy:
    src: config
    dest: "{{ ansible_env.HOME }}/.config/sway/config"
    mode: '0644'
  become: true

- name: Install sway autostart config
  copy:
    src: config.d/autostart.conf
    dest: "{{ ansible_env.HOME }}/.config/sway/config.d/autostart.conf"
    mode: '0644'
  become: true

- name: Copy foot config
  ansible.builtin.copy:
    src: foot.in
    dest: "{{ ansible_env.HOME }}/.config/foot/foot.ini"
    mode: '0755'
  become: true