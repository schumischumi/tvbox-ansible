############################################
# Install flatpak packages
############################################
- name: Ensure flatpak installed
  dnf:
    name: flatpak
    state: present

- name: Add flathub repo
  flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

- name: Install apps
  command: >
    flatpak install --assumeyes --noninteractive {{ item }}
  loop: "{{ flatpak_vaapi_apps }}"

############################################
# Add overrides
############################################
- name: Detect GPU
  command: lspci -nnk
  register: gpu_info
  changed_when: false

- name: Determine VAAPI driver
  set_fact:
    vaapi_driver: >-
      {% if "Intel" in gpu_info.stdout and "UHD" in gpu_info.stdout %}iHD
      {% elif "Intel" in gpu_info.stdout %}i965
      {% elif "AMD" in gpu_info.stdout or "Radeon" in gpu_info.stdout %}radeonsi
      {% else %}iHD{% endif %}

- name: Show selected VAAPI driver
  debug:
    msg: "Using VAAPI driver: '{{ vaapi_driver }}'"

- name: Apply VAAPI override to flatpak apps
  command: >
    flatpak override --env=LIBVA_DRIVER_NAME={{ vaapi_driver }} --device=dri {{ item }}
  loop: "{{ flatpak_vaapi_apps }}"
