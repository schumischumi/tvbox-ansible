- name: Create sudoers.d file for passwordless apt-get update/upgrade
  ansible.builtin.copy:
    content: |
      {{ tv_user }} ALL = NOPASSWD: /usr/bin/ap-get upgrade *
      {{ tv_user }} ALL = NOPASSWD: /usr/bin/ap-get update *
    dest: /etc/sudoers.d/90-dnf-upgrade
    owner: root
    group: root
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
